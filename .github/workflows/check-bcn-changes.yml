name: Check BCN Legal Changes

# Detecta cambios en articulos legales BCN.cl comparando hashes SHA256
# Si hay cambios: evalua impacto con DeepSeek y envia notificacion Telegram
# Siempre actualiza last_checked en data/legal-articles.json

# Ejecuta automaticamente cada lunes a las 06:00 UTC (03:00 Chile)
# Disponible como trigger manual desde GitHub Actions UI para testing
on:
  schedule:
    - cron: '0 6 * * 1'    # Lunes 06:00 UTC (03:00 Chile)
  workflow_dispatch:         # Trigger manual para testing

jobs:
  check-changes:
    name: Detectar cambios en articulos BCN
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Para commitear last_checked a data/legal-articles.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install openai

      - name: Check BCN for changes
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/check-bcn-changes.py

      - name: Commit updated last_checked
        if: always()
        run: |
          git config user.name "calendarioescolar-bot"
          git config user.email "bot@calendarioescolar.cl"
          git add data/legal-articles.json
          git diff --staged --quiet || git commit -m "chore: update legal-articles last_checked [skip ci]"
          git pull --rebase --autostash origin main
          git push origin ${{ github.ref_name }}
