name: Check Source Health

on:
  schedule:
    - cron: '0 10 * * 1'   # Lunes 10:00 UTC (07:00 Chile)
  workflow_dispatch:         # Manual trigger

jobs:
  check-sources:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write        # Alertas via issue + GITHUB_TOKEN (los secrets TELEGRAM_* no existen)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Check source URLs
        id: check
        run: node scripts/check-sources.js
        continue-on-error: true

      - name: Commit health update
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/source-health.json
          git diff --staged --quiet || git commit -m "chore: update source health [skip ci]"
          git pull --rebase --autostash origin main
          git push

      # Alertas via issue + GITHUB_TOKEN (patrón probado de sync-deploy.yml).
      # Los secrets TELEGRAM_* no existen en el repo — el curl anterior era un
      # no-op silencioso (404 sin -f = step verde, alerta perdida).
      - name: Alert on problems (issue)
        if: steps.check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PROBLEMS=$(node -e "
            var h = require('./data/source-health.json');
            var p = Object.values(h.sources).filter(function(s) {
              return s.status === 'broken' || s.status === 'error' || s.status === 'timeout';
            });
            if (p.length === 0) process.exit(1);
            p.forEach(function(s) {
              console.log('- ' + s.id + ': ' + s.status + (s.error ? ' — ' + s.error : ' (HTTP ' + s.http_status + ')'));
            });
          " 2>/dev/null) || exit 0

          BODY="Fuentes con problemas detectadas el $(date -u +%Y-%m-%d\ %H:%M) UTC:

          $PROBLEMS

          Log del run: $RUN_URL"
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --search "ALERTA fuentes con problemas in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "ALERTA fuentes con problemas $(date -u +%Y-%m-%d)" \
              --body "$BODY"
          fi

      - name: Alert on content changes (issue)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          CHANGED=$(node -e "
            var h = require('./data/source-health.json');
            var c = Object.values(h.sources).filter(function(s) { return s.hash_changed; });
            if (c.length === 0) process.exit(1);
            c.forEach(function(s) {
              console.log('- ' + s.id + ': contenido cambio');
            });
          " 2>/dev/null) || exit 0

          BODY="Contenido cambió en fuentes oficiales — verificar si los datos del sitio siguen correctos:

          $CHANGED

          Log del run: $RUN_URL"
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --search "ALERTA cambio en fuentes in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "ALERTA cambio en fuentes $(date -u +%Y-%m-%d)" \
              --body "$BODY"
          fi
