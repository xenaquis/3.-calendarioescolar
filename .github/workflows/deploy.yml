name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

# Mismo grupo que sync-deploy.yml: un push durante la ventana del cron diario
# producia dos deploys en carrera.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Generar páginas
        run: node scripts/generate-pages.js

      - name: Build
        run: bash scripts/build.sh

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler pages deploy public --project-name=${{ vars.CF_PROJECT_NAME }}
