name: Extract & Validate PDF Data (Visual Pipeline)

on:
  workflow_dispatch:
    inputs:
      fix:
        description: 'Auto-corregir datos si hay discrepancias'
        required: false
        default: 'false'
      region:
        description: 'Procesar solo una region (slug, ej: aysen). Vacio = todas.'
        required: false
        default: ''
      force_download:
        description: 'Re-descargar PDFs aunque ya existan'
        required: false
        default: 'false'
  schedule:
    - cron: '0 14 15 5 *'    # 15 mayo 14:00 UTC — verificacion primer semestre
    - cron: '0 14 31 12 *'   # 31 diciembre 14:00 UTC — resoluciones Mineduc ya publicadas

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyMuPDF
        run: pip install PyMuPDF

      - name: Install OCR tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils tesseract-ocr tesseract-ocr-spa

      - name: Generate PNGs from PDFs
        run: python scripts/pdf-to-png.py --all --output-dir=data/snapshots

      - name: Organize table PNGs
        run: node scripts/organize-snapshots.js

      - name: Extract data from PNGs (visual)
        id: extract
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.region }}" ]; then ARGS="$ARGS --region=${{ github.event.inputs.region }}"; fi
          node scripts/extract-visual.js $ARGS
        continue-on-error: true

      - name: Validate extraction
        run: node scripts/validate-extraction.js --strict

      - name: Commit snapshots and report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Agregar PNGs de tablas y manifest
          git add data/snapshots/*.png 2>/dev/null || true
          git add data/snapshots/png-manifest.json 2>/dev/null || true
          git add data/extraction-validation-report.json 2>/dev/null || true

          # Si --fix fue usado, agregar datos corregidos
          if [ "${{ github.event.inputs.fix }}" = "true" ]; then
            git add data/calendar-config.json data/pages.json 2>/dev/null || true
          fi

          git diff --staged --quiet || git commit -m "chore: update visual extraction report [skip ci]"
          git push

      - name: Regenerate if fixed
        if: github.event.inputs.fix == 'true' && steps.extract.outcome == 'success'
        run: |
          node scripts/generate-pages.js
          node scripts/validate.js

          git add public/ data/
          git diff --staged --quiet || git commit -m "chore: regenerate pages from visual-corrected data [skip ci]"
          git push

      - name: Alert on discrepancies
        if: steps.extract.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MISMATCHES=$(node -e "
            var fs = require('fs');
            try {
              var r = JSON.parse(fs.readFileSync('./data/extraction-validation-report.json', 'utf8'));
              if (!r.summary || r.summary.total_errors === 0) process.exit(1);
              var failedRegions = Object.keys(r.per_region || {}).filter(function(k) { return !r.per_region[k].passed; });
              failedRegions.slice(0, 10).forEach(function(region) {
                var errs = r.per_region[region].errors || [];
                errs.forEach(function(e) { console.log('• ' + region + ': ' + e); });
              });
              if (failedRegions.length > 10) console.log('... y ' + (failedRegions.length - 10) + ' regiones mas');
            } catch(e) { process.exit(1); }
          " 2>/dev/null) || exit 0

          if [ -z "$MISMATCHES" ]; then exit 0; fi

          MSG=$(printf '📄 *Errores extraccion visual — calendarioescolar.cl*\n\n%s\n\nRevisar data/extraction-validation-report.json' "$MISMATCHES")

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(printf '{"chat_id":"%s","text":"%s","parse_mode":"Markdown"}' "$TELEGRAM_CHAT_ID" "$(echo "$MSG" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')")"

      - name: Summary
        if: always()
        run: |
          node -e "
            var fs = require('fs');
            try {
              var r = JSON.parse(fs.readFileSync('./data/extraction-validation-report.json', 'utf8'));
              console.log('=== VISUAL PIPELINE EXTRACTION REPORT ===');
              console.log('Regiones verificadas: ' + r.summary.regions_checked);
              console.log('Regiones OK: ' + r.summary.regions_passed);
              console.log('Regiones fallidas: ' + r.summary.regions_failed);
              console.log('Total errores: ' + r.summary.total_errors);
              console.log('Total advertencias: ' + r.summary.total_warnings);
              var groups = r.checks.cross_region.groups_detected;
              Object.keys(groups).forEach(function(g) {
                console.log('  Grupo ' + g + ': ' + groups[g].join(', '));
              });
            } catch(e) { console.log('No se pudo leer el reporte: ' + e.message); }
          "
