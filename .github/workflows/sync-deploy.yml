name: Verificación diaria + Deploy

# Ejecuta automaticamente cada dia a las 6:00 UTC (03:00 Chile)
# También disponible como trigger manual desde GitHub Actions UI
# NUNCA disparado por push (eso lo maneja deploy.yml)
#
# 2026-06-12: SYNC DESDE GOOGLE SHEET DESACTIVADO (decisión: el repo es la
# fuente de verdad de datos; el Sheet quedó desactualizado — tenía 14 feriados
# vs los 16 correctos — y un sync lo habría sobreescrito). El script
# scripts/sync-from-sheet.js sigue disponible para uso manual si se reactiva,
# previa actualización de la celda feriadosCompletos del Sheet.
#
# Qué hace este workflow ahora:
#   1. check-feriados.js — verificación determinística de feriados contra
#      las reglas legales codificadas (sin red, no puede flakear)
#   2. generate + validate + build
#   3. deploy diario a Cloudflare Pages (freshness: sitemap lastmod,
#      dateModified, próximo-feriado estático recalculado)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Deploy incluso si no hay cambios de datos'
        required: false
        default: 'false'
        type: boolean

jobs:
  verify-and-deploy:
    name: Verificar → Generar → Validar → Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      issues: write        # Para crear issue de alerta si el workflow falla

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Paso 1: Verificación determinística de feriados ────────────────
      - name: Verificar feriados contra cálculo legal
        run: node scripts/check-feriados.js

      # ── Paso 2: Generar páginas ─────────────────────────────────────────
      - name: Generar páginas
        run: node scripts/generate-pages.js

      # ── Paso 3: Validar integridad ─────────────────────────────────────
      - name: Validar datos
        run: node scripts/validate.js

      # ── Paso 4: Build ──────────────────────────────────────────────────
      - name: Build
        run: bash scripts/build.sh

      # ── Paso 5: Deploy a Cloudflare Pages ─────────────────────────────
      - name: Deploy a Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler pages deploy public --project-name=${{ vars.CF_PROJECT_NAME }}

      # ── Paso 6: Alerta si falló (issue en GitHub → notificación email) ──
      # Sin secrets nuevos: usa GITHUB_TOKEN. Si ya hay un issue abierto de
      # ci-failure, comenta en él en vez de crear duplicados.
      - name: Crear issue de alerta si falló
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --search "ALERTA verificacion diaria in:title" --json number --jq '.[0].number // empty')
          BODY="La verificación diaria falló el $(date -u +%Y-%m-%d\ %H:%M) UTC.

          Posibles causas: check-feriados detectó discrepancia en los datos, validate.js encontró errores, o falló el deploy a Cloudflare.

          Log del run: $RUN_URL"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "ALERTA verificacion diaria fallo $(date -u +%Y-%m-%d)" \
              --body "$BODY"
          fi

      # ── Paso 7: Resumen ────────────────────────────────────────────────
      - name: Resumen
        if: always()
        run: |
          echo "=== Resumen ==="
          echo "Trigger: ${{ github.event_name }}"
          if [ -f public/health.json ]; then
            echo "Health JSON:"
            cat public/health.json
          fi
