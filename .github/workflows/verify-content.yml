name: Verify Content Against Sources

on:
  schedule:
    - cron: '0 12 1 * *'   # Dia 1 de cada mes, 12:00 UTC (09:00 Chile)
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Re-verificar todas las afirmaciones (incluso las ya verificadas)'
        required: false
        default: 'false'
  workflow_run:
    workflows: ["Check Source Health"]
    types: [completed]

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write        # Alertas via issue + GITHUB_TOKEN (los secrets TELEGRAM_* no existen)
    # Solo correr si fue disparado manualmente, por cron, o si el check de fuentes tuvo exito
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Verify content
        id: verify
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FORCE_ALL: ${{ github.event.inputs.force_all || 'false' }}
        run: node scripts/verify-content.js
        continue-on-error: true

      - name: Commit results
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/verification-results.json
          if [ -f data/verification-log.jsonl ]; then git add data/verification-log.jsonl; fi
          git diff --staged --quiet || git commit -m "chore: update verification results [skip ci]"
          git pull --rebase --autostash origin main
          git push

      # Alerta via issue + GITHUB_TOKEN (patrón probado de sync-deploy.yml).
      # El curl-Telegram anterior era no-op silencioso: secrets inexistentes.
      - name: Alert on INCORRECTO (issue)
        if: steps.verify.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          INCORRECTOS=$(node -e "
            var r = require('./data/verification-results.json');
            r.results.filter(function(c) { return c.verdict === 'INCORRECTO'; }).forEach(function(c) {
              console.log('- ' + c.id + ': ' + c.evidence);
            });
          " 2>/dev/null) || exit 0

          if [ -z "$INCORRECTOS" ]; then exit 0; fi

          BODY="DATOS INCORRECTOS detectados por verify-content el $(date -u +%Y-%m-%d\ %H:%M) UTC:

          $INCORRECTOS

          Acción requerida: verificar y corregir datos.
          Log del run: $RUN_URL"
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --search "ALERTA datos incorrectos in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "ALERTA datos incorrectos $(date -u +%Y-%m-%d)" \
              --body "$BODY"
          fi

      - name: Summary
        if: always()
        run: |
          node -e "
            var r = require('./data/verification-results.json');
            console.log('=== VERIFICACION DE CONTENIDO ===');
            console.log('Total: ' + r.total_claims);
            console.log('Correcto: ' + r.correcto);
            console.log('Incorrecto: ' + r.incorrecto);
            console.log('No verificable: ' + r.no_verificable);
            console.log('Fuente inaccesible: ' + r.fuente_inaccesible);
          "
