name = "calendar-monitor"
main = "index.js"
compatibility_date = "2024-01-01"

# Cron: jueves 08:00 UTC (en Cloudflare cron 1=domingo; el "0 8 * * 1" anterior
# corria DOMINGO, no lunes como decia el comentario). Jueves = cobertura de
# mitad de semana entre los crons de GitHub Actions (lunes).
[triggers]
crons = ["0 8 * * THU"]

# KV Namespace para almacenar hashes, estado y sugerencias pendientes
# Crear con: npx wrangler kv namespace create CALENDAR_KV
# Luego reemplazar REPLACE_WITH_KV_ID con el ID que retorna el comando
[[kv_namespaces]]
binding = "CALENDAR_KV"
id = "545a6671deb24021b70fa859dea576fd"

# Variables no secretas
[vars]
ENVIRONMENT = "production"
# URL pública del worker (para construir botones inline de Telegram)
# Reemplazar con la URL real: https://calendar-monitor.<tu-subdominio>.workers.dev
WORKER_URL = "https://calendar-monitor.thevalis.workers.dev"
# Repo GitHub donde vive el proyecto: "usuario/repo"
GITHUB_REPO = "xenaquis/3.-calendarioescolar"

# Secrets — configurar via Cloudflare Dashboard o:
#   npx wrangler secret put DEEPSEEK_API_KEY
#   npx wrangler secret put MONITOR_SECRET
#   npx wrangler secret put TELEGRAM_BOT_TOKEN
#   npx wrangler secret put TELEGRAM_CHAT_ID
#   npx wrangler secret put GITHUB_TOKEN
#
# DEEPSEEK_API_KEY  : API key de DeepSeek (https://platform.deepseek.com)
# MONITOR_SECRET    : Contraseña para /trigger, /pending, /apply-update, /dismiss
# TELEGRAM_BOT_TOKEN: Token del bot de Telegram (BotFather)
# TELEGRAM_CHAT_ID  : ID del chat/canal donde enviar alertas
# GITHUB_TOKEN      : Personal Access Token con permiso contents:write
#                     Crear en: GitHub → Settings → Developer settings → PATs
#                     Scopes necesarios: repo (o contents:write en fine-grained PAT)
# ALERT_WEBHOOK_URL : (Opcional) Webhook de Discord/Slack/ntfy.sh
